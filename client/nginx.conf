server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SSE-safe proxy to ai-chat-service
    location /api/chat {
        proxy_pass http://ai-chat-service:3001/api/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        add_header X-Accel-Buffering no;
    }

    # Proxy to create-image-service (strips /api/images prefix)
    location /api/images/ {
        proxy_pass http://create-image-service:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
